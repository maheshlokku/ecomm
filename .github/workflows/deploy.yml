name: Deploy App on EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nodejs npm
          npm install -g serve sass pm2

      - name: Build SCSS
        run: |
          sass ./scss:./css || true

      - name: Stop old app (if running)
        run: |
          pm2 delete all || true

      - name: Run Application
        run: |
          pm2 start "npx serve -l 0.0.0.0:8080"
          pm2 save