name: Deploy App on EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y nodejs npm
          npm install -g serve sass

      - name: Build SCSS
        run: |
          sass ./scss:./css || true

      - name: Run Application
        run: |
          nohup npx serve -l 3000 > output.log 2>&1 &