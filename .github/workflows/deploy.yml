name: Sample Web App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node.js (for SCSS)
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install -g sass

      - name: Compile SCSS to CSS
        run: |
          sass ./scss:./css

      - name: Start simple server
        run: |
          npx serve -l 3000 &
          sleep 10
