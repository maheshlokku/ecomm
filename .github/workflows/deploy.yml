name: Deploy Frontend App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Build application
        run: npm run build

      - name: Clean old deployment
        run: sudo rm -rf /var/www/html/*

      - name: Deploy new build
        run: sudo cp -r dist/* /var/www/html/
        # If your project uses "build" folder instead of "dist", change accordingly:
        # sudo cp -r build/* /var/www/html/

      - name: Restart Nginx
        run: sudo systemctl restart nginx